[font]
size = 10.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[keyboard]
bindings = [
	# Paste from clipboard (uses 'action')
	{ key = "V", mods = "Control|Shift", action = "Paste" },

	# Copy to clipboard (uses 'action')
	{ key = "C", mods = "Control|Shift", action = "Copy" }
]

[window]
opacity = 1.0
padding = { x = 10, y = 10 }

# github-theme colors
# https://github.com/projekt0n/github-theme-contrib/tree/main/themes/alacritty
#
# Github Dark Dimmed

[colors.primary]
background = "0x22272e"
foreground = "0xadbac7"

# Cursor colors
[colors.cursor]
text   = "0x22272e"
cursor = "0xadbac7"

# Normal colors
[colors.normal]
black   = "0x545d68"
red     = "0xf47067"
green   = "0x57ab5a"
yellow  = "0xc69026"
blue    = "0x539bf5"
magenta = "0xb083f0"
cyan    = "0x39c5cf"
white   = "0x909dab"

# Bright colors
[colors.bright]
black   = "0x636e7b"
red     = "0xff938a"
green   = "0x6bc46d"
yellow  = "0xdaaa3f"
blue    = "0x6cb6ff"
magenta = "0xb083f0"
cyan    = "0x39c5cf"
white   = "0x909dab"

