# Unbind the default combination
unbind C-b

# Set the prefix
set-option -g prefix C-a
bind C-a send-prefix

# Generate and expect xterm-style function key sequences
set-window-option -g xterm-keys on

# Use the Vi bindings in copy mode
set-window-option -g mode-keys vi

# Enable mouse support
set -g mouse on

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Navigation panes using Alt + arrow keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Allow these bindings to pass through for word navigation in shell
unbind -n C-Left
unbind -n C-Right
unbind -n C-S-Left
unbind -n C-S-Right

# Resize panes using Alt Shift + arrow keys
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# Reload tmux config quickly
bind r source-file ~/.tmux.conf \; display " Reloaded tmux config"

# Renumbering remaining panes
set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Set the positions on the bar
set -g @tmux-dotbar-position top
set -g @tmux-dotbar-session-position "right"

set -g @tmux-dotbar-left "true"

# Change the session text
set -g @tmux-dotbar-session-text "  #S  "

# Status bar position
set -g status-position top

# Set the colorscheme
set -g @tmux-dotbar-bg "#22272e"
set -g @tmux-dotbar-fg "#585b70"
set -g @tmux-dotbar-fg-current "#adbac7"
set -g @tmux-dotbar-fg-session "#768390"
set -g @tmux-dotbar-fg-prefix "#f47067"

# Match the original terminal colors (don't tint)
set -g terminal-overrides ",*:RGB"

# Set history limit
set -g history-limit 5000

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'vaaleyard/tmux-dotbar'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
